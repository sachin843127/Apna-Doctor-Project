<div class="symptom-container">
  <h2>🩺 Symptom Checker</h2>
  <p class="sub">Describe your problem (Hindi / English)</p>

  <textarea id="symptomText" placeholder="Jaise: mujhe bukhar aur sar dard hai..."></textarea>

  <button id="checkBtn">Check Now</button>

  <div id="resultBox" class="hidden">
    <h3>🩻 Possible Condition</h3>
    <p id="disease"></p>

    <h4>✅ What to Do</h4>
    <ul id="doList"></ul>

    <h4>❌ What to Avoid</h4>
    <ul id="dontList"></ul>

    <h4>🍎 Food Suggestion</h4>
    <p id="food"></p>

    <h4>🏠 Home Remedy</h4>
    <p id="remedy"></p>
  </div>
</div>

<link rel="stylesheet" href="symptom.css">
<script src="symptom.js"></script>
